<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monzo CLI — OAuth Callback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f5f5f5; color: #333;
    }
    .card {
      background: white; border-radius: 12px; padding: 2rem;
      max-width: 480px; width: 90%; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .code-box {
      background: #f0f0f0; border-radius: 8px; padding: 1rem;
      font-family: monospace; font-size: 1.1rem; word-break: break-all;
      margin: 1rem 0; user-select: all;
    }
    .copy-btn {
      background: #e5533d; color: white; border: none; border-radius: 8px;
      padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #c94430; }
    .copy-btn.copied { background: #4caf50; }
    .hint { color: #888; font-size: 0.875rem; margin-top: 1rem; }
    .error { color: #e5533d; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Monzo CLI Authorization</h1>
    <div id="content"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const titleEl = document.getElementById('title');
    const contentEl = document.getElementById('content');

    if (code) {
      titleEl.textContent = 'Authorization Code';
      contentEl.innerHTML = `
        <p>Copy this code and paste it into your terminal:</p>
        <div class="code-box" id="code">${code}</div>
        <button class="copy-btn" id="copyBtn">Copy Code</button>
        <p class="hint">This page is safe to close after copying.</p>
      `;
      document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(code).then(() => {
          this.textContent = 'Copied!';
          this.classList.add('copied');
        });
      });
    } else {
      titleEl.textContent = 'Error';
      contentEl.innerHTML = `<p class="error">No authorization code found in the URL.</p>`;
    }
  </script>
</body>
</html>
